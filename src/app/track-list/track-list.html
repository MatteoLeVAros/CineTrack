<!-- track-list.html (enrichi) -->
 <section class="grid">
    <app-track-form (trackCreated)="addTrack($event)" />
    <input
        type="search"
        placeholder="Rechercher un titre ou un artiste…"
        [value]="searchTerm()"
        (input)="searchTerm.set($any($event.target).value)" />

    @for (track of filteredTracks(); track track.id) {
    <app-track-card
        [track]="track"
        [active]="track.id === selectedId()"
        (select)="selectedId.set($event.id)" />
    } @empty {
    <p>Aucun résultat pour « {{ searchTerm() }} ».</p>
    }
    
    @if (selectedId()) {
        <app-track-detail [trackId]="selectedId()!" />
    }
 </section>
